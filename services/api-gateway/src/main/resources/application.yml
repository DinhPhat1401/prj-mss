server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/v1/auth/**

        - id: user-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/v1/users/**

        - id: wearable-sync-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/v1/wearable/**

        - id: health-assessment-service
          uri: http://localhost:8084
          predicates:
            - Path=/api/v1/health/**

        - id: recommendation-service
          uri: http://localhost:8085
          predicates:
            - Path=/api/v1/recommendation/**

        - id: blacklist-filter-service
          uri: http://localhost:8086
          predicates:
            - Path=/api/v1/blacklist/**

        - id: notification-service
          uri: http://localhost:8087
          predicates:
            - Path=/api/v1/notifications/**

        - id: history-service
          uri: http://localhost:8088
          predicates:
            - Path=/api/v1/history/**
